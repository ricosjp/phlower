
model:
  inputs:
    - name: data1_feature0
      members:
        - name: feature0
          n_last_dim: 10
    - name: data2_feature0
      members:
        - name: feature0
          n_last_dim: 10

    - name: data1_feature1
      members:
        - name: feature1
          n_last_dim: 12
    - name: data2_feature1
      members:
        - name: feature1
          n_last_dim: 12

  fields:
    - name: support1
    
  network:
    nn_type: GROUP
    name: GROUP1
    outputs:
      - name: data1_out_feature
        n_last_dim: 5
      - name: data2_out_feature
        n_last_dim: 5
    
    modules:
      - nn_type: AdaptorGroup
        name: DEMO
        inputs:
          - name: data1_feature0
            n_last_dim: 10
          - name: data1_feature1
            n_last_dim: 12
          - name: data2_feature0
            n_last_dim: 10
          - name: data2_feature1
            n_last_dim: 12

        adaptor_setting:
          adaptor_type: prefix_sorting
          prefix_settings: []
        network:
          nn_type: GROUP
          name: MAIN_GROUP
          inputs:
            - name: feature0
              n_last_dim: 10
            - name: feature1
              n_last_dim: 12
          outputs:
            - name: out_feature
              n_last_dim: 5
          modules:
            - nn_type: Concatenator
              name: Concat0
              input_keys:
                - feature0
                - feature1
              output_key: concat0
              destinations:
                - MLP0

            - nn_type: MLP
              name: MLP0
              output_key: mlp0
              destinations:
                - Share0
              nn_parameters:
                nodes: [-1, 20, 22]
                activations: ["identity", "identity"]

            - nn_type: Share
              name: Share0
              input_keys:
                - mlp0
              output_key: share1
              destinations:
                - OUT_MLP
              nn_parameters:
                reference_name: MLP0

            - nn_type: MLP
              name: OUT_MLP
              input_keys:
                - share1
              output_key: out_feature
              nn_parameters:
                nodes: [-1, 10, 5]
                activations: ["identity", "identity"]
