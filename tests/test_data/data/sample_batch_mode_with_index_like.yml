misc:
  tests:
    desired_shapes:
      inputs: 
        feature0: [1, 3, 4]
        feature1: [10, 5, 1]
        feature2: [11, 3, 2]
      labels:
        feature3: [1, 3, 4, 2]
      fields:
        s0: [5, 5]
        s1: [10, 5]

model:
  inputs:
    - name: feature0
      is_time_series: true
      members:
        - name: x0

    - name: feature1
      members:
        - name: x1
          n_last_dim: 1

    - name: feature2
      batch_mode: axiswise
      members:
        - name: x2
          n_last_dim: 1
        - name: x3
          n_last_dim: 1

  labels:
    - name: feature3
      is_time_series: true
      members:
        - name: y0
          n_last_dim: 1

  fields:
    - name: s0
      batch_mode: block_diagonal
    - name: s1
      batch_mode: null
    - name: index_like0
      dtype: int32
      batch_mode: index_shifting
    - name: index_like1
      dtype: int32
      batch_mode: index_shifting
  
  network:
    nn_type: GROUP
    name: Dummy

training: {}